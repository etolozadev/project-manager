services:
  - type: web
    name: project-manager-v2
    runtime: docker
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      # Generá la clave con: php artisan key:generate --show
      - key: APP_KEY
        sync: false
      # Se actualiza automáticamente con tu URL de Render al hacer el deploy
      - key: APP_URL
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      # Extraé estos valores del connection string de Neon
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_SSLMODE
        value: require
      - key: REDIS_HOST
        value: "127.0.0.1"
      - key: REDIS_CLIENT
        value: phpredis
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error
