services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: project-manager-v2-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - project-manager-v2-network
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:alpine
    container_name: project-manager-v2-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - project-manager-v2-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: project-manager-v2-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-project_manager_v2}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "3307:3306"
    volumes:
      - project-manager-v2-db:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - project-manager-v2-network

  redis:
    image: redis:alpine
    container_name: project-manager-v2-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    networks:
      - project-manager-v2-network

  mailpit:
    image: axllent/mailpit
    container_name: project-manager-v2-mailpit
    restart: unless-stopped
    ports:
      - "1026:1025"
      - "8026:8025"
    networks:
      - project-manager-v2-network

networks:
  project-manager-v2-network:
    driver: bridge

volumes:
  project-manager-v2-db:
    driver: local
