; ============================================================
; PHP Performance — Project Manager V2
; ============================================================

upload_max_filesize = 100M
post_max_size       = 100M
memory_limit        = 256M
max_execution_time  = 300

; ============================================================
; OPcache
; ============================================================
opcache.enable                = 1
opcache.enable_cli            = 0
opcache.memory_consumption    = 256
opcache.max_accelerated_files = 20000
opcache.interned_strings_buffer = 16
opcache.fast_shutdown         = 1
opcache.save_comments         = 1
opcache.optimization_level    = 0x7FFFBFFF

; ── CRÍTICO: revalidate_freq=0 causaba verificar TODOS los
;    archivos en cada request (8000+ archivos por Docker = ~5s)
;    Con =2 solo verifica cada 2 segundos → requests siguientes rápidos
opcache.validate_timestamps   = 1
opcache.revalidate_freq       = 2

; ── OPcache preloading (carga el framework en memoria al iniciar FPM)
;    Elimina lecturas de disco en el PRIMER request también
opcache.preload               = /var/www/docker/php/preload.php
opcache.preload_user          = www
