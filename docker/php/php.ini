; ============================================================
; PHP Performance — Project Manager V2
; ============================================================

; Límites de subida
upload_max_filesize = 100M
post_max_size       = 100M
memory_limit        = 256M
max_execution_time  = 300

; ============================================================
; OPcache — cache de bytecode compilado
; El vendor tiene ~8000 archivos PHP, necesitamos espacio
; ============================================================
opcache.enable                 = 1
opcache.enable_cli             = 0

; Memoria para bytecode (antes: 128, ahora: 256)
opcache.memory_consumption     = 256

; Slots de archivos — debe ser mayor al total de archivos PHP
; vendor (~8k) + app (~200) + framework → usar 20000 con margen
opcache.max_accelerated_files  = 20000

; Strings internos (identificadores, nombres de función, etc.)
opcache.interned_strings_buffer = 16

; revalidate_freq=0 → solo verifica timestamps al limpiar caché
; En dev se puede dejar en 2 (detecta cambios cada 2s)
opcache.revalidate_freq        = 0

; Sigue verificando si el archivo cambió en disco
opcache.validate_timestamps    = 1

; Acelera el cierre de requests
opcache.fast_shutdown          = 1

; Guarda comentarios (necesario para anotaciones/attributes)
opcache.save_comments          = 1

; Nivel de optimización del compilador (0-3, 1 es seguro)
opcache.optimization_level     = 0x7FFFBFFF
