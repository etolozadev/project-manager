; PHP-FPM Pool — Project Manager V2

[www]
user  = www
group = www

listen = 9000
listen.owner = www
listen.group = www

; STATIC: workers fijos, sin cold starts tras el primer warm-up
pm             = static
pm.max_children = 5
pm.max_requests = 0

; Slow log en directorio con permisos de escritura
slowlog                 = /tmp/php-fpm-slow.log
request_slowlog_timeout = 2s

clear_env = no
